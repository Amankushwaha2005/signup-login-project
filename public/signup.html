<!DOCTYPE html>
<html>
<head>
  <title>Signup</title>
  <meta name="viewport"
  content="width=device-width,initial-scale=1.0">
  <link rel="stylesheet" href="signup.css">
</head>
<body>
  <div class="container">
  <h2>Signup</h2>
  <form id="signupForm">
    <input type="text" placeholder="Name" id="name" required><br><br>
    <input type="email" placeholder="Email" id="email" required><br><br>
    <input type="password" placeholder="Password" id="password" required><br><br>
    <div class="password-box">
      <span class="togglePassword()" onclick="togglePassword()"></span>
    </div><br>
    <button type="submit">Signup</button><br>
    <p class="login-html">
      Already have an account?
      <a href="login.html">Login</a>
      </p>
  </form>
</div>
  <script>
    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      function  togglePassword(){
        const password = document.getElementById("password");
         password.type = password.type ==="password" ? "text":"password";
          password.type = "text"
      }

      const name = document.getElementById("name");
       const email = document.getElementById("email");
        const password = document.getElementById("password");
      const data = {
        name: name.value,
        email: email.value,
        password: password.value
      };

      const res = await fetch("/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      const result = await res.json();
      alert(result.message);
    });
  </script>
</body>
</html>
